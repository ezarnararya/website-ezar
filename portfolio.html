<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<nav>
    <ul>
        <li><a href="index.html">HOME</a></li>
        <li><a href="portfolio.html">PORTFOLIO</a></li>
        <li><a href="contact.html">CONTACT</a></li>
        <li>
            <button 
                id="darkModeToggle"
                aria-label="Toggle dark mode"
                title="Dark Mode">
                    <i class="fa-solid fa-moon"></i>
            </button>
        </li>
    </ul>
</nav>

<section class="portfolio">
    <h1>My Photography Portfolio</h1>
    <p>Here is a preview of my work</p>

    <div class="canva-container">
        <iframe 
            loading="lazy"
            src="https://www.canva.com/design/DAG_Hh1ZF9E/DLEFFCZfXgI7rfphmxZ3hg/view?embed"
            allowfullscreen="allowfullscreen"
            allow="fullscreen">
        </iframe>
    </div>

    <p class="credit">
        <a href="https://www.canva.com/design/DAG_Hh1ZF9E/DLEFFCZfXgI7rfphmxZ3hg/view"
           target="_blank" rel="noopener">
           View on Canva
        </a>
    </p>
</section>
<script>

const toggle = document.getElementById('darkModeToggle');

if(localStorage.getItem('darkMode') === 'enabled') {

    document.body.classList.add('dark');

    toggle.innerHTML = '<i class="fa-solid fa-sun"></i>';
}

toggle.addEventListener('click', () => {

    document.body.classList.toggle('dark');

    if(document.body.classList.contains('dark')) {

        toggle.innerHTML = '<i class="fa-solid fa-sun"></i>';

        localStorage.setItem('darkMode', 'enabled');

    } else {

        toggle.innerHTML = '<i class="fa-solid fa-moon"></i>';

        localStorage.setItem('darkMode', 'disabled');
    }

});

</script>
</body>
</html>
